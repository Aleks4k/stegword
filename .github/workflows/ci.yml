name: CI
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - name: Run tests
        run: clj -A:test -M -m app.test-runner